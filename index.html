<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTCUSDT 1M Charting Terminal</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --border: #1d2635;
      --text: #e5e7eb;
      --muted: #8b95a7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #facc15;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000000;
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      overflow: auto;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: #000000;
    }

    .topbar {
      padding: 8px 16px;
      background: #000000;
      border-bottom: 1px solid var(--border);
    }

    .chart-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      min-height: calc(100vh - 98px);
    }

    .charts {
      display: grid;
      grid-template-rows: minmax(560px, 3fr) minmax(360px, 1.7fr) minmax(280px, 1.25fr);
      min-height: 1200px;
    }

    #priceChart { min-height: 560px; }
    #macdChart { min-height: 360px; position: relative; }
    #rsiChart { min-height: 280px; }

    #priceChart, #macdChart { border-bottom: 1px solid var(--border); }

    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 8px 16px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      background: #000000;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      margin-right: 6px;
      background: var(--yellow);
    }

    .dot.live { background: var(--green); }
    .dot.offline { background: var(--red); }

    a[href*="tradingview"],
    [class*="tradingview"],
    [aria-label*="TradingView"],
    [title*="TradingView"] {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    @media (max-width: 900px) {
      .topbar { padding: 8px; }
      .chart-shell { grid-template-columns: 1fr; min-height: auto; }
      .charts {
        min-height: 980px;
        grid-template-rows: minmax(500px, 1fr) minmax(230px, auto) minmax(230px, auto);
      }
      #priceChart { min-height: 500px; }
      #macdChart { min-height: 320px; }
      #rsiChart { min-height: 260px; }
      .footer { align-items: center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"></header>

    <section class="chart-shell">
      <div class="charts">
        <div id="priceChart"></div>
        <div id="macdChart"></div>
        <div id="rsiChart"></div>
      </div>
    </section>

    <footer class="footer">
      <span><span id="statusDot" class="dot"></span><span id="statusText">Connecting...</span></span>
    </footer>
  </main>

  <script>
    const priceEl = document.getElementById('priceChart');
    const rsiEl = document.getElementById('rsiChart');
    const macdEl = document.getElementById('macdChart');

    const rightAxisOptions = {
      visible: true,
      borderVisible: true,
      borderColor: '#1d2635',
      alignLabels: true,
      entireTextOnly: false,
      ticksVisible: true,
      minimumWidth: 116,
    };


    const crosshairOptions = {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { visible: true, labelVisible: true, color: 'rgba(156, 163, 175, 0.55)', width: 1, style: LightweightCharts.LineStyle.Dashed },
      horzLine: { visible: true, labelVisible: true, color: 'rgba(156, 163, 175, 0.55)', width: 1, style: LightweightCharts.LineStyle.Dashed },
    };

    const commonLayout = { background: { color: '#000000' }, textColor: '#cbd5e1', fontSize: 13 };
    const commonGrid = { vertLines: { color: '#111827' }, horzLines: { color: '#111827' } };

    const priceChart = LightweightCharts.createChart(priceEl, {
      layout: commonLayout,
      grid: commonGrid,
      crosshair: crosshairOptions,
      rightPriceScale: { ...rightAxisOptions, autoScale: true, scaleMargins: { top: 0.15, bottom: 0 } },
      leftPriceScale: { visible: false },
      timeScale: { borderColor: '#1d2635', timeVisible: false, secondsVisible: false },
      localization: {
        priceFormatter: price => {
          if (Math.abs(price) < 1e-8) return '';
          return '$' + price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
      },
    });

    const macdChart = LightweightCharts.createChart(macdEl, {
      layout: commonLayout,
      grid: commonGrid,
      rightPriceScale: { ...rightAxisOptions, scaleMargins: { top: 0.14, bottom: 0.14 } },
      leftPriceScale: { visible: false },
      timeScale: { borderColor: '#1d2635', timeVisible: false, secondsVisible: false },
      crosshair: crosshairOptions,
    });

    const rsiChart = LightweightCharts.createChart(rsiEl, {
      layout: commonLayout,
      grid: commonGrid,
      crosshair: crosshairOptions,
      rightPriceScale: { ...rightAxisOptions, scaleMargins: { top: 0.08, bottom: 0 } },
      leftPriceScale: { visible: false },
      timeScale: { borderColor: '#1d2635', timeVisible: false, secondsVisible: false },
      localization: {
        priceFormatter: value => (value <= 0 || value > 100) ? '' : value.toFixed(2),
      },
    });

    const charts = [priceChart, macdChart, rsiChart];
    let isTimeScaleSyncing = false;

    charts.forEach(sourceChart => {
      sourceChart.timeScale().subscribeVisibleLogicalRangeChange(logicalRange => {
        if (!logicalRange || isTimeScaleSyncing) return;

        isTimeScaleSyncing = true;
        try {
          charts.forEach(targetChart => {
            if (targetChart !== sourceChart) {
              targetChart.timeScale().setVisibleLogicalRange(logicalRange);
            }
          });
        } finally {
          isTimeScaleSyncing = false;
        }
      });
    });

    const SYMBOL = 'BTCUSDT';
    const INTERVAL = '1M';

    const ohlcSeries = priceChart.addBarSeries({
      title: 'BTCUSDT',
      priceFormat: {
        type: 'custom',
        minMove: 0.0001,
        formatter: price => '$' + price.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 }),
      },
      upColor: '#008000',
      downColor: '#ff0000',
      thinBars: false,
      autoscaleInfoProvider: original => {
        const result = original();
        if (result?.priceRange) result.priceRange.minValue = 0;
        return result;
      }
    });

    const ema10Series = priceChart.addLineSeries({ color: '#ffffff', lineWidth: 2, title: 'EMA 10' });
    const ema20Series = priceChart.addLineSeries({ color: '#38bdf8', lineWidth: 2, title: 'EMA 20' });
    const ema50Series = priceChart.addLineSeries({ color: '#facc15', lineWidth: 2, title: 'EMA 50' });

    const rsiSeries = rsiChart.addLineSeries({
      color: '#a78bfa', lineWidth: 3, title: 'RSI 2 Smooth', priceScaleId: 'right',
      priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
      lastValueVisible: true, priceLineVisible: false, crosshairMarkerVisible: true, crosshairMarkerRadius: 4,
      autoscaleInfoProvider: () => ({ priceRange: { minValue: 0, maxValue: 100 } }),
    });
    const rsi70 = rsiChart.addLineSeries({
      color: '#ff0000',
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dotted,
      title: 'RSI Upper Band',
      lastValueVisible: true,
      priceLineVisible: true,
      priceLineColor: '#ff0000',
      priceLineWidth: 1,
      priceLineStyle: LightweightCharts.LineStyle.Dotted,
      crosshairMarkerVisible: false,
    });
    const rsi50 = rsiChart.addLineSeries({
      color: '#787B86',
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dotted,
      title: 'RSI Middle Band',
      priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
      lastValueVisible: true,
      priceLineVisible: true,
      priceLineColor: '#787B86',
      priceLineWidth: 1,
      priceLineStyle: LightweightCharts.LineStyle.Dotted,
      crosshairMarkerVisible: false,
    });
    const rsi30 = rsiChart.addLineSeries({
      color: '#008000',
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dotted,
      title: 'RSI Lower Band',
      lastValueVisible: true,
      priceLineVisible: true,
      priceLineColor: '#008000',
      priceLineWidth: 1,
      priceLineStyle: LightweightCharts.LineStyle.Dotted,
      crosshairMarkerVisible: false,
    });

    const macdHistogramSeries = macdChart.addHistogramSeries({ priceScaleId: 'right', priceFormat: { type: 'price', precision: 2, minMove: 0.01 }, base: 0, title: 'Histogram', priceLineVisible: false, lastValueVisible: true });
    const macdLineSeries = macdChart.addLineSeries({ priceScaleId: 'right', color: '#2962ff', lineWidth: 2, title: 'MACD', priceFormat: { type: 'price', precision: 2, minMove: 0.01 }, priceLineVisible: false, lastValueVisible: true });
    const macdSignalSeries = macdChart.addLineSeries({ priceScaleId: 'right', color: '#ff6d00', lineWidth: 2, title: 'Signal line', priceFormat: { type: 'price', precision: 2, minMove: 0.01 }, priceLineVisible: false, lastValueVisible: true });
    const macdZeroLine = macdChart.addLineSeries({ color: 'rgba(120, 123, 134, 0.55)', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });

    let candles = [];
    let socket = null;

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    function formatPrice(value) {
      if (!Number.isFinite(value)) return '—';
      return '$' + value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function setStatus(text, state) {
      statusText.textContent = text;
      statusDot.className = `dot ${state}`;
    }


    function updateDocumentTitle() {
      const last = candles.at(-1);
      const livePrice = last && Number.isFinite(last.close) ? `  ${formatPrice(last.close)}` : '';
      document.title = `${SYMBOL}  ${livePrice}`;
    }

    let syncTimeout = null;
    function syncRightScales() {
      if (syncTimeout) clearTimeout(syncTimeout);
      syncTimeout = setTimeout(() => {
        try {
          const w1 = priceChart.priceScale('right').width();
          const w2 = macdChart.priceScale('right').width();
          const w3 = rsiChart.priceScale('right').width();

          const maxW = Math.max(w1, w2, w3, 116);

          if (w1 !== maxW) priceChart.priceScale('right').applyOptions({ minimumWidth: maxW });
          if (w2 !== maxW) macdChart.priceScale('right').applyOptions({ minimumWidth: maxW });
          if (w3 !== maxW) rsiChart.priceScale('right').applyOptions({ minimumWidth: maxW });
        } catch (e) {}
      }, 16);
    }

    async function loadHistoricalData() {
      updateDocumentTitle();
      setStatus('Loading...', '');
      const baseUrls = ['https://api.binance.com', 'https://api1.binance.com'];
      const klinePath = '/api/v3/klines';

      let rows = null;
      let lastError = null;

      for (const baseUrl of baseUrls) {
        try {
          const url = `${baseUrl}${klinePath}?symbol=${SYMBOL}&interval=${INTERVAL}&limit=500`;
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) {
            if (response.status === 403 || response.status === 429) {
              throw new Error(`HTTP ${response.status}`);
            }
            throw new Error('Could not fetch data');
          }
          rows = await response.json();
          if (!Array.isArray(rows) || rows.length === 0) throw new Error('No Candles Returned');
          break;
        } catch (error) { lastError = error; }
      }

      if (!rows) {
        const allowedErrors = new Set(['HTTP 403', 'HTTP 429', 'No Candles Returned', 'Could not fetch data']);
        const message = allowedErrors.has(lastError?.message) ? lastError.message : 'Could not fetch data';
        throw new Error(message);
      }

      candles = rows.map(row => ({
        time: Math.floor(row[0] / 1000), open: Number(row[1]), high: Number(row[2]),
        low: Number(row[3]), close: Number(row[4]),
      }));

      renderAll();
      connectSocket();
    }

    function renderAll() {
      updateSeriesData();
      updateDocumentTitle();
      priceChart.timeScale().fitContent();
      syncRightScales();
    }

    function ema(data, period) {
      const k = 2 / (period + 1);
      let previous;
      return data.map((d, i) => {
        previous = i === 0 ? d.close : d.close * k + previous * (1 - k);
        return { time: d.time, value: previous };
      });
    }

    function macdValues(data, fast = 12, slow = 26, signal = 9) {
      const fastEma = ema(data, fast);
      const slowEma = ema(data, slow);
      const macdLineSource = data.map((d, i) => ({ time: d.time, close: fastEma[i].value - slowEma[i].value }));
      const signalLineSource = ema(macdLineSource, signal);

      return data.map((d, i) => {
        const macd = macdLineSource[i].close;
        const signalValue = signalLineSource[i].value;
        const hist = macd - signalValue;
        const prevHist = i > 0 ? macdLineSource[i - 1].close - signalLineSource[i - 1].value : hist;
        const color = hist >= 0 ? (hist > prevHist ? '#26a69a' : '#b2dfdb') : (hist > prevHist ? '#ffcdd2' : '#ff5252');
        return { time: d.time, macd, signal: signalValue, hist, color };
      });
    }

    function elderImpulseBars(data, elderEma, histogram) {
      return data.map((d, i) => {
        let color = d.close >= d.open ? '#008000' : '#ff0000';
        if (i > 0) {
          const emaRising = elderEma[i].value > elderEma[i - 1].value;
          const emaFalling = elderEma[i].value < elderEma[i - 1].value;
          const histRising = histogram[i].hist > histogram[i - 1].hist;
          const histFalling = histogram[i].hist < histogram[i - 1].hist;
          if (emaRising && histRising) color = '#008000';
          else if (emaFalling && histFalling) color = '#ff0000';
          else color = '#0000ff';
        }
        return { time: d.time, open: d.open, high: d.high, low: d.low, close: d.close, color };
      });
    }

    function rsi(data, period = 14) {
      const output = [];
      if (data.length <= period) return output;
      let upRma = 0, downRma = 0;
      for (let i = 1; i < data.length; i++) {
        const change = data[i].close - data[i - 1].close;
        const up = Math.max(change, 0), down = -Math.min(change, 0);
        if (i <= period) {
          upRma += up; downRma += down;
          if (i === period) { upRma /= period; downRma /= period; } else continue;
        } else {
          upRma = (upRma * (period - 1) + up) / period;
          downRma = (downRma * (period - 1) + down) / period;
        }
        const value = downRma === 0 ? 100 : upRma === 0 ? 0 : 100 - (100 / (1 + upRma / downRma));
        output.push({ time: data[i].time, value });
      }
      return output;
    }

    function smoothIndicatorSeries(series, period = 5) {
      if (!series.length || period <= 1) return series;
      const alpha = 1 / period;
      let previous = series[0].value;
      return series.map((point, index) => {
        previous = index === 0 ? point.value : (point.value * alpha) + (previous * (1 - alpha));
        return { time: point.time, value: previous };
      });
    }

    function updateSeriesData() {
      const ema10 = ema(candles, 10);
      const ema20 = ema(candles, 20);
      const ema50 = ema(candles, 50);
      const elderEma = ema(candles, 13);
      const macdData = macdValues(candles);
      const lineTimes = candles.map(({ time }) => time);

      ohlcSeries.setData(elderImpulseBars(candles, elderEma, macdData));
      ema10Series.setData(ema10);
      ema20Series.setData(ema20);
      ema50Series.setData(ema50);
      rsiSeries.setData(smoothIndicatorSeries(rsi(candles, 2), 5));
      rsi70.setData(lineTimes.map(time => ({ time, value: 70 })));
      rsi50.setData(lineTimes.map(time => ({ time, value: 50 })));
      rsi30.setData(lineTimes.map(time => ({ time, value: 30 })));
      macdHistogramSeries.setData(macdData.map(({ time, hist, color }) => ({ time, value: hist, color })));
      macdLineSeries.setData(macdData.map(({ time, macd }) => ({ time, value: macd })));
      macdSignalSeries.setData(macdData.map(({ time, signal }) => ({ time, value: signal })));
      macdZeroLine.setData(lineTimes.map(time => ({ time, value: 0 })));
    }

    function connectSocket() {
      const stream = `${SYMBOL.toLowerCase()}@kline_${INTERVAL}`;
      socket = new WebSocket(`wss://stream.binance.com:9443/ws/${stream}`);
      socket.onopen = () => setStatus('Connected', 'live');
      socket.onerror = () => setStatus('Connection Error', 'offline');
      socket.onclose = () => setStatus('Disconnected', 'offline');
      socket.onmessage = event => {
        const k = JSON.parse(event.data).k;
        const candle = { time: Math.floor(k.t / 1000), open: Number(k.o), high: Number(k.h), low: Number(k.l), close: Number(k.c) };
        const lastIndex = candles.length - 1;
        if (candles[lastIndex]?.time === candle.time) { candles[lastIndex] = candle; }
        else { candles.push(candle); if (candles.length > 500) candles.shift(); }
        updateSeriesData();
        updateDocumentTitle();
        syncRightScales();
      };
    }


    function resizeCharts() {
      if (priceEl.clientWidth === 0) return;
      priceChart.applyOptions({ width: priceEl.clientWidth, height: priceEl.clientHeight });
      macdChart.applyOptions({ width: macdEl.clientWidth, height: macdEl.clientHeight });
      rsiChart.applyOptions({ width: rsiEl.clientWidth, height: rsiEl.clientHeight });
      syncRightScales();
    }

    const chartResizeObserver = new ResizeObserver(resizeCharts);
    chartResizeObserver.observe(document.querySelector('.charts'));

    loadHistoricalData().catch(error => setStatus(error.message, 'offline'));
  </script>
</body>
</html>
